info:
  name: List users
  type: http
  seq: 1

http:
  method: GET
  url: "{{baseUrl}}/users"
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: |-
        test('Users response is successful', function () {
            expect(res.getStatus()).to.be.oneOf([200]);
        });
        const users = res.getBody();
        if (Array.isArray(users) && users.length > 0 && users[0].id) {
            pm.collectionVariables.set('userId', users[0].id);
        }

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
